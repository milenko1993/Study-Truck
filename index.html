<!DOCTYPE html>

<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    margin: 0;
}

/* HEADER */
.header {
    position: sticky;
    top: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

/* CONTAINER */
.container {
    width: 1000px;
    margin: auto;
    padding: 20px;
}

/* 🔥 LOGIN BLOK */
#auth {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* 🔥 INPUTI */
input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 6px;
}

/* 👇 LOGIN inputi malo veći (ali ne previše) */
#auth input {
    width: 280px;
}

/* ostali inputi */
.top-bar input {
    flex: 1;
}

/* BUTTON */
button {
    padding: 10px 16px;
    border-radius: 10px;
    border: none;
    margin: 6px;
    background: #2ecc71;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.logout { background: #e74c3c; }

/* TOP BAR */
.top-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

/* DASHBOARD */
.dashboard {
    display: flex;
    gap: 20px;
}

.column {
    flex: 1;
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
}

/* TASK */
.task {
    display: flex;
    justify-content: space-between;
    padding: 8px;
    margin: 6px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.2s;
}

.task:hover {
    transform: scale(1.03);
}

.task:active {
    transform: scale(0.95);
    background: rgba(46,204,113,0.4);
}

.completed {
    text-decoration: line-through;
    opacity: 0.5;
}

/* STATS */
.stats {
    text-align: center;
    margin-top: 10px;
}

/* HISTORY */
.history-item {
    border-left: 3px solid #2ecc71;
    padding-left: 10px;
    margin: 5px 0;
}
</style>

</head>

<body>

<div class="header">
<h2>📘 StudyTrack</h2>
<span id="userEmail"></span>
</div>

<div class="container">

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<div class="top-bar">
<input id="taskInput" placeholder="Zadatak">
<input type="datetime-local" id="taskTime">
<button onclick="addTask()">➕</button>
</div>

<div class="dashboard">

<!-- 📊 STATISTIKA -->

<div class="column">
<h3>📊 Statistika</h3>
<canvas id="chart"></canvas>

<div class="stats">
Završeno: <span id="done">0</span><br>
Preostalo: <span id="left">0</span><br>
Procenat: <span id="percent">0%</span>
</div>
</div>

<!-- 📋 ZADACI -->

<div class="column">
<h3>📋 Zadaci</h3>
<div id="taskList"></div>
</div>

<!-- 📜 HISTORY -->

<div class="column">
<h3>📜 Istorija Zadataka</h3>
<div id="historyList"></div>
</div>

</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAacLUBW1jTTq09ZG1AsxHgJ69F5W9TgdM",
  authDomain: "study-truck.firebaseapp.com",
  projectId: "study-truck",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.signOut = signOut;
</script>

<script>
let tasks=[];
let currentUser=null;

function register(){
    createUserWithEmailAndPassword(auth,email.value,password.value)
    .then(res=>{currentUser=res.user;showApp();})
    .catch(e=>alert(e.message));
}

function login(){
    signInWithEmailAndPassword(auth,email.value,password.value)
    .then(res=>{currentUser=res.user;showApp();})
    .catch(e=>alert(e.message));
}

function logout(){signOut(auth);location.reload();}

function showApp(){
    document.getElementById("auth").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("userEmail").innerText=currentUser.email;
    loadTasks();
}

function loadTasks(){
    tasks=JSON.parse(localStorage.getItem("tasks_"+currentUser.uid))||[];
    render();
}

function saveTasks(){
    localStorage.setItem("tasks_"+currentUser.uid,JSON.stringify(tasks));
}

function addTask(){
    if(!taskInput.value)return;

    tasks.push({
        text:taskInput.value,
        time:taskTime.value,
        done:false
    });

    saveTasks();
    render();
}

function toggle(i){
    tasks[i].done=!tasks[i].done;
    saveTasks();
    render();
}

function del(i){
    tasks.splice(i,1);
    saveTasks();
    render();
}

function render(){
    let list=document.getElementById("taskList");
    let history=document.getElementById("historyList");

    list.innerHTML="";
    history.innerHTML="";

    let done=0;

    tasks.forEach((t,i)=>{
        let div=document.createElement("div");
        div.className="task";

        if(t.done){div.classList.add("completed");done++;}

        div.innerHTML=t.text;

        div.onclick=()=>toggle(i);

        let b=document.createElement("button");
        b.innerText="❌";
        b.onclick=(e)=>{e.stopPropagation();del(i);};

        div.appendChild(b);
        list.appendChild(div);

        if(t.done){
            let h=document.createElement("div");
            h.className="history-item";
            h.innerText="✔ "+t.text;
            history.appendChild(h);
        }
    });

    updateStats(done,tasks.length);
    drawChart(done,tasks.length);
}

function updateStats(done,total){
    let left = total - done;
    let percent = total === 0 ? 0 : Math.round((done/total)*100);

    document.getElementById("done").innerText = done;
    document.getElementById("left").innerText = left;
    document.getElementById("percent").innerText = percent + "%";
}

function drawChart(done,total){
    let ctx=document.getElementById("chart");

    if(window.myChart)window.myChart.destroy();

    window.myChart=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:['Završeno','Nezavršeno'],
            datasets:[{
                data:[done,total-done],
                backgroundColor:['#2ecc71','#e74c3c']
            }]
        }
    });
}
</script>

</body>
</html>
