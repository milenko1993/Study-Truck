<!DOCTYPE html>

<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 900px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 0 40px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    opacity: 0.7;
    margin-bottom: 20px;
}

input, button {
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    background: linear-gradient(45deg,#2ecc71,#27ae60);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.logout {
    background: #e74c3c;
}

.top-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.top-bar input {
    flex: 1;
}

.main {
    display: flex;
    gap: 20px;
}

.left, .right {
    flex: 1;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    transition: 0.3s;
}

.task:hover {
    transform: scale(1.02);
}

.completed {
    text-decoration: line-through;
    opacity: 0.5;
}

.time {
    font-size: 12px;
    opacity: 0.7;
}

.history-item {
    font-size: 14px;
    padding: 5px 0;
    border-left: 2px solid #2ecc71;
    padding-left: 10px;
}

</style>

</head>

<body>

<div class="container">

<h1>📘 StudyTrack</h1>
<div class="subtitle">Organizuj svoj uspeh</div>

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<button class="logout" onclick="logout()">Logout</button>

<div class="top-bar">
<input id="taskInput" placeholder="Dodaj zadatak...">
<input type="datetime-local" id="taskTime">
<button onclick="addTask()">➕</button>
</div>

<div class="main">

<div class="left">

<div class="card">
<canvas id="chart"></canvas>
</div>

<div id="taskList"></div>

</div>

<div class="right">

<div class="card">
<h3>📜 History</h3>
<div id="historyList"></div>
</div>

</div>

</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "study-truck.firebaseapp.com",
  projectId: "study-truck",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.signOut = signOut;
</script>

<script>
let tasks=[];
let currentUser=null;

function register(){
    createUserWithEmailAndPassword(auth,email.value,password.value)
    .then(res=>{currentUser=res.user;showApp();})
    .catch(e=>alert(e.message));
}

function login(){
    signInWithEmailAndPassword(auth,email.value,password.value)
    .then(res=>{currentUser=res.user;showApp();})
    .catch(e=>alert(e.message));
}

function logout(){signOut(auth);location.reload();}

function showApp(){
    auth.style.display="none";
    app.style.display="block";
    loadTasks();
}

function loadTasks(){
    tasks=JSON.parse(localStorage.getItem("tasks_"+currentUser.uid))||[];
    render();
}

function saveTasks(){
    localStorage.setItem("tasks_"+currentUser.uid,JSON.stringify(tasks));
}

function addTask(){
    if(!taskInput.value)return;
    tasks.push({text:taskInput.value,time:taskTime.value,done:false});
    saveTasks();
    render();
}

function toggle(i){
    tasks[i].done=!tasks[i].done;
    saveTasks();
    render();
}

function del(i){
    tasks.splice(i,1);
    saveTasks();
    render();
}

function render(){
    let list=document.getElementById("taskList");
    let history=document.getElementById("historyList");

    list.innerHTML="";
    history.innerHTML="";

    let done=0;

    tasks.forEach((t,i)=>{
        let div=document.createElement("div");
        div.className="task";

        if(t.done){div.classList.add("completed");done++;}

        div.innerHTML=`
            <div>
                ${t.text}
                <div class="time">${t.time||""}</div>
            </div>
        `;

        div.onclick=()=>toggle(i);

        let b=document.createElement("button");
        b.innerText="❌";
        b.onclick=(e)=>{e.stopPropagation();del(i);};

        div.appendChild(b);
        list.appendChild(div);

        if(t.done){
            let h=document.createElement("div");
            h.className="history-item";
            h.innerText="✔ "+t.text;
            history.appendChild(h);
        }
    });

    drawChart(done,tasks.length);
}

function drawChart(done,total){
    let ctx=document.getElementById("chart");

    if(window.myChart)window.myChart.destroy();

    window.myChart=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:['Završeno','Nezavršeno'],
            datasets:[{
                data:[done,total-done],
                backgroundColor:['#2ecc71','#e74c3c']
            }]
        },
        options:{animation:{animateScale:true}}
    });
}
</script>

</body>
</html>
