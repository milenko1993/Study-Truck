<!DOCTYPE html>

<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack ULTRA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #0b1e3c;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.container {
    width: 400px;
    background: #122b50;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    padding: 8px;
    border-radius: 5px;
    border: none;
    margin: 5px 0;
}

button {
    background: #2ecc71;
    cursor: pointer;
}

li {
    background: #1c3b6e;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.delete {
    background: red;
    color: white;
}
</style>

</head>

<body>

<div class="container">

<h2 id="userTitle"></h2>

<input id="username" placeholder="Unesi ime">
<button onclick="saveUser()">Login</button>

<hr>

<input id="taskInput" placeholder="Zadatak">
<input type="datetime-local" id="taskTime">
<button onclick="addTask()">Dodaj</button>

<ul id="taskList"></ul>

<canvas id="chart"></canvas>

</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let username = localStorage.getItem("username") || "";

document.getElementById("userTitle").innerText = username ? "👋 " + username : "";

function saveUser(){
    username = document.getElementById("username").value;
    localStorage.setItem("username", username);
    location.reload();
}

function addTask(){
    let text = document.getElementById("taskInput").value;
    let time = document.getElementById("taskTime").value;

    if(!text) return;

    tasks.push({text, done:false, time});
    render();
}

function toggle(i){
    tasks[i].done = !tasks[i].done;
    render();
}

function del(i){
    tasks.splice(i,1);
    render();
}

function render(){
    let list = document.getElementById("taskList");
    list.innerHTML="";

    let done = 0;

    tasks.forEach((t,i)=>{
        let li = document.createElement("li");

        if(t.done){ li.classList.add("completed"); done++; }

        li.innerHTML = t.text + "<br><small>"+ (t.time || "") +"</small>";

        li.onclick=()=>toggle(i);

        let b = document.createElement("button");
        b.innerText="❌";
        b.className="delete";

        b.onclick=(e)=>{ e.stopPropagation(); del(i); };

        li.appendChild(b);
        list.appendChild(li);
    });

    localStorage.setItem("tasks", JSON.stringify(tasks));

    drawChart(done, tasks.length);
}

function drawChart(done,total){
    let ctx = document.getElementById("chart");

    if(window.myChart) window.myChart.destroy();

    window.myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Završeno', 'Preostalo'],
            datasets: [{
                data: [done, total-done],
            }]
        }
    });
}

function checkReminders(){
    let now = new Date().toISOString().slice(0,16);

    tasks.forEach(t=>{
        if(t.time === now && !t.done){
            new Notification("⏰ Podsjetnik: " + t.text);
        }
    });
}

if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

setInterval(checkReminders, 60000);

render();
</script>

</body>
</html>
