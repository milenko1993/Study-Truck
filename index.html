<!DOCTYPE html>

<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack CLOUD</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0b1e3c,#1c3b6e);
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 30px;
}

.container {
    width: 420px;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
}

input, button {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
}

button { background: #2ecc71; cursor: pointer; }
.logout { background: red; }

li {
    background: rgba(255,255,255,0.1);
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.completed {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>

</head>

<body>

<div class="container">

<h2 id="title">StudyTrack</h2>

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">
<button class="logout" onclick="logout()">Logout</button>

<input id="taskInput" placeholder="Zadatak">
<input type="datetime-local" id="taskTime">
<button onclick="addTask()">Dodaj</button>

<ul id="taskList"></ul>

<canvas id="chart"></canvas>

</div>

</div>

<!-- 🔥 FIREBASE -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAacLUBW1jTTq09ZG1AsxHgJ69F5W9TgdM",
  authDomain: "study-truck.firebaseapp.com",
  projectId: "study-truck",
  storageBucket: "study-truck.firebasestorage.app",
  messagingSenderId: "181921831800",
  appId: "1:181921831800:web:7d2636de20ca03aa5bc68d",
  measurementId: "G-LTYDSFQTSF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.signOut = signOut;
window.onAuthStateChanged = onAuthStateChanged;
</script>

<!-- 🔥 APP -->

<script>
let tasks = [];
let currentUser = null;

function register(){
    createUserWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> alert("Uspešna registracija"))
    .catch(e=> alert(e.message));
}

function login(){
    signInWithEmailAndPassword(auth, email.value, password.value)
    .then(()=> alert("Ulogovan si"))
    .catch(e=> {
        console.log(e);
        alert(e.message);
    });
}

function logout(){
    signOut(auth);
}

onAuthStateChanged(auth, user=>{
    if(user){
        currentUser = user;
        document.getElementById("auth").style.display="none";
        document.getElementById("app").style.display="block";
        loadTasks();
    } else {
        document.getElementById("auth").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

function loadTasks(){
    tasks = JSON.parse(localStorage.getItem("tasks_"+currentUser.uid)) || [];
    render();
}

function saveTasks(){
    localStorage.setItem("tasks_"+currentUser.uid, JSON.stringify(tasks));
}

function addTask(){
    if(!taskInput.value) return;

    tasks.push({
        text: taskInput.value,
        time: taskTime.value,
        done:false
    });

    saveTasks();
    render();
}

function toggle(i){
    tasks[i].done = !tasks[i].done;
    saveTasks();
    render();
}

function del(i){
    tasks.splice(i,1);
    saveTasks();
    render();
}

function render(){
    let list = document.getElementById("taskList");
    list.innerHTML="";

    let done=0;

    tasks.forEach((t,i)=>{
        let li=document.createElement("li");

        if(t.done){ li.classList.add("completed"); done++; }

        li.innerHTML=t.text+"<br><small>"+(t.time||"")+"</small>";

        li.onclick=()=>toggle(i);

        let b=document.createElement("button");
        b.innerText="❌";
        b.onclick=(e)=>{ e.stopPropagation(); del(i); };

        li.appendChild(b);
        list.appendChild(li);
    });

    drawChart(done, tasks.length);
}

function drawChart(done,total){
    let ctx=document.getElementById("chart");

    if(window.myChart) window.myChart.destroy();

    window.myChart=new Chart(ctx,{
        type:'doughnut',
        data:{
            labels:['Završeno','Preostalo'],
            datasets:[{data:[done,total-done]}]
        }
    });
}

// 🔔 reminder
function checkReminders(){
    let now = new Date();

    let localTime = now.getFullYear()+"-"+
    String(now.getMonth()+1).padStart(2,'0')+"-"+
    String(now.getDate()).padStart(2,'0')+"T"+
    String(now.getHours()).padStart(2,'0')+":"+
    String(now.getMinutes()).padStart(2,'0');

    tasks.forEach(t=>{
        if(t.time === localTime && !t.done){
            alert("⏰ "+t.text);
        }
    });
}

setInterval(checkReminders,60000);
</script>

</body>
</html>
