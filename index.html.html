<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<title>StudyTrack</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0b1e3c;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 50px;
}

.container {
    width: 350px;
    background: #122b50;
    padding: 20px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

.input-section {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 8px;
    border-radius: 5px;
    border: none;
}

button {
    padding: 8px;
    background: #2ecc71;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

ul {
    list-style: none;
    padding: 0;
    margin-top: 20px;
}

li {
    background: #1c3b6e;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

li.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.stats {
    margin-top: 15px;
    text-align: center;
}
</style>

</head>
<body>

<div class="container">
    <h1>StudyTrack</h1>
    <p>Organizuj svoje zadatke</p>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Unesi zadatak...">
        <button onclick="addTask()">Dodaj</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
        Završeno: <span id="completed">0</span> /
        Ukupno: <span id="total">0</span>
    </div>
</div>

<script>
let tasks = [];

function addTask() {
    const input = document.getElementById("taskInput");
    const text = input.value.trim();

    if (text === "") return;

    tasks.push({ text: text, done: false });
    input.value = "";

    renderTasks();
}

function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    renderTasks();
}

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    let completed = 0;

    tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.textContent = task.text;

        if (task.done) {
            li.classList.add("completed");
            completed++;
        }

        li.onclick = () => toggleTask(index);

        list.appendChild(li);
    });

    document.getElementById("completed").textContent = completed;
    document.getElementById("total").textContent = tasks.length;
}
</script>

</body>
</html>
